<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Axis Mundi favicon, subtle version: bare glyph, transparent, theme-adaptive. Gilt is
       constant; the world-circle flips ink/bone with the tab's color scheme. -->
  <style>
    .w { stroke: #24222a; }
    @media (prefers-color-scheme: dark) {
      .w { stroke: #ece8df; }
    }
  </style>

  <!-- axis -->
  <line x1="32" y1="3" x2="32" y2="61" stroke="#d9a441" stroke-width="5"/>

  <!-- world -->
  <circle cx="32" cy="37" r="15.5" fill="none" class="w" stroke-width="5"/>
</svg>
