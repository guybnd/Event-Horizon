name: CI

# FLUX-941: PR/push gate for the EH repo itself (repo dev-hygiene, NOT a user-facing
# feature — never installed into user projects). Reuses the step set release.yml proves
# works. Lint is intentionally excluded: its baseline is still being burned down (CLAUDE.md),
# so running it would paint every PR red. typecheck + check:boundary + engine tests are the gate.
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The one real gate: dev runs via tsx/esbuild which strip types, so a type error
      # surfaces nowhere else.
      - name: Type-check (portal + engine)
        run: npm run typecheck

      # FLUX-938: adapter-boundary guard — forbids per-CLI code outside engine/src/agents/.
      - name: Adapter-boundary guard
        run: npm run check:boundary

      - name: Engine tests
        run: npm run test -w engine
