name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build source distribution
        run: npm run dist:source

      - name: Build macOS executable
        run: npm run dist:mac

      - name: Build Windows executable
        # Cross-compile Windows exe on the macOS runner via pkg
        run: npm run dist:win

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES_FILE=".docs/release-notes/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            # Strip YAML frontmatter (BSD sed compatible)
            awk 'BEGIN{s=0} /^---$/{s++;next} s>=2{print}' "$NOTES_FILE" > release-body.md
          else
            echo "## ${VERSION}" > release-body.md
            echo "" >> release-body.md
            echo "Release ${VERSION}" >> release-body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          draft: false
          prerelease: false
          files: |
            event-horizon-source.zip
            releases/event-horizon-macos-*.zip
            releases/event-horizon-win-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
