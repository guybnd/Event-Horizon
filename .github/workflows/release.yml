name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # FLUX-774: gate the publish on the green checks that exist locally, so a tagged release
      # can't ship a type regression or a broken engine. typecheck + lint (FLUX-583/FLUX-1073)
      # + engine tests are the load-bearing gate.
      - name: Type-check (portal + engine)
        run: npm run typecheck

      - name: Lint (portal + engine)
        run: npm run lint

      - name: Engine tests
        run: npm run test -w engine

      - name: Build source distribution
        run: npm run dist:source

      - name: Build macOS executable
        run: npm run dist:mac

      - name: Build Windows executable
        # Cross-compile Windows exe on the macOS runner via Node.js SEA + postject
        run: npm run dist:win

      # FLUX-793: macOS desktop app (Electron). The engine ships as the esbuild bundle run via
      # Electron-as-node, so this only needs the regular build + electron-builder on the mac runner.
      - name: Build macOS desktop app (Electron)
        # First release exercising the Electron CI path — keep it non-blocking so a desktop-build
        # hiccup can't sink the core release (source + SEA binaries + the GitHub Release). If it
        # fails, the .dmg simply isn't attached (the files glob below matches nothing).
        continue-on-error: true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # unsigned build — don't probe the keychain on CI
        run: |
          npm run build
          npm ci --prefix electron
          VER="${GITHUB_REF_NAME#v}"
          npm --prefix electron version "$VER" --no-git-tag-version --allow-same-version
          npm --prefix electron run build:mac -- --publish never

      - name: Extract release notes
        id: release_notes
        # VERSION comes from the workflow-level env: (github.ref_name), so it never
        # interpolates ${{ }} into this shell — avoids GHA script injection (FLUX-802).
        run: |
          NOTES_FILE=".docs/release-notes/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            # Strip YAML frontmatter (BSD sed compatible)
            awk 'BEGIN{s=0} /^---$/{s++;next} s>=2{print}' "$NOTES_FILE" > release-body.md
          else
            echo "## ${VERSION}" > release-body.md
            echo "" >> release-body.md
            echo "Release ${VERSION}" >> release-body.md
          fi

      # FLUX-835: created as a draft so it can never appear as "Latest" before the finalize
      # job has verified the full artifact set — release-windows and finalize both run after
      # this and operate on the draft by tag.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          draft: true
          prerelease: false
          files: |
            event-horizon-source.zip
            releases/event-horizon-macos-*.zip
            releases/event-horizon-win-*.zip
            electron/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # FLUX-793: the Windows desktop installer (NSIS) must build on a Windows runner — electron-builder
  # can't reliably cross-build NSIS on macOS. Runs after `release` so the GitHub Release already
  # exists, then appends the .exe installer to it (action-gh-release upserts by tag, body untouched).
  release-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (portal + engine bundle)
        run: npm run build

      # FLUX-1323: boot the packaged SEA binary and hit /api/health — nothing in CI previously
      # launched the built binary, which let FLUX-1321 (isSea detection silently failing) ship
      # undetected. Non-continue-on-error: a broken standalone binary must block the release.
      # timeout-minutes (FLUX-1325) is a second layer of defense on top of the script's own
      # internal HEALTH_TIMEOUT_MS/FETCH_TIMEOUT_MS bounds, in case some other step of the script
      # (build/extract/spawn) itself hangs — without it, the only backstop is GitHub Actions'
      # default 6-hour job timeout.
      - name: Smoke-test Windows SEA binary
        timeout-minutes: 10
        run: npm run smoke-test:win

      - name: Build Windows desktop app (Electron)
        continue-on-error: true # non-blocking (see the macOS desktop step) — first run of this path
        shell: bash
        run: |
          npm ci --prefix electron
          VER="${GITHUB_REF_NAME#v}"
          npm --prefix electron version "$VER" --no-git-tag-version --allow-same-version
          npm --prefix electron run build:win -- --publish never

      - name: Append Windows installer to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: electron/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # FLUX-835: the gate between "assets attached" and "release visible as Latest". Runs after
  # both asset-producing jobs so it sees the final asset list regardless of which one finishes
  # last. Core artifacts (source zip + both SEA zips) are required — release.yml's Electron
  # steps are continue-on-error, so without this gate a missing .dmg/.exe (or a build-side glob
  # miss on a core zip) could go public unnoticed, same as the "green but wrong" v1.0.0 miss.
  finalize:
    needs: [release, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify artifacts and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -e
          assets="$(gh release view "$VERSION" --json assets -q '.assets[].name')"
          echo "Attached assets:"
          echo "$assets"

          missing_core=""
          echo "$assets" | grep -qx 'event-horizon-source.zip' || missing_core="$missing_core event-horizon-source.zip"
          echo "$assets" | grep -q '^event-horizon-macos-.*\.zip$' || missing_core="$missing_core event-horizon-macos-*.zip"
          echo "$assets" | grep -q '^event-horizon-win-.*\.zip$' || missing_core="$missing_core event-horizon-win-*.zip"

          if [ -n "$missing_core" ]; then
            echo "::error::Release $VERSION is missing core artifact(s):$missing_core — leaving as draft."
            exit 1
          fi

          missing_desktop=""
          echo "$assets" | grep -q '\.dmg$' || missing_desktop="$missing_desktop macOS .dmg"
          echo "$assets" | grep -q '\.exe$' || missing_desktop="$missing_desktop Windows .exe"

          if [ -n "$missing_desktop" ]; then
            echo "::warning::Release $VERSION is missing desktop artifact(s):$missing_desktop — publishing as a partial release."
            gh release view "$VERSION" --json body -q '.body' > notes.md
            {
              echo ""
              echo "⚠️ Partial release — desktop app missing:$missing_desktop"
            } >> notes.md
            gh release edit "$VERSION" --notes-file notes.md
          fi

          gh release edit "$VERSION" --draft=false --latest
