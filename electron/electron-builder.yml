# electron-builder config for the Event Horizon desktop shell (FLUX-793).
# Build with: npm --prefix electron run build  (or build:win / build:mac / build:linux)
appId: dev.eventhorizon.desktop
productName: Event Horizon
copyright: Event Horizon

directories:
  output: dist
  buildResources: build

# Only the shell's own files ship in the asar; the engine is staged as a resource (below).
# build/icon-axis.png + build/tray-axis.png are shipped too so main.js can set the window + tray
# icon at runtime (electron-builder derives the platform .icns/.ico app icon from icon: below;
# win.icon points at the hand-tuned icon-axis.ico instead of deriving from the PNG).
files:
  - main.js
  - preload.js
  - package.json
  - build/icon-axis.png
  - build/tray-axis.png

# Bundle the self-contained engine bundle so the app needs no external Node/engine. Run
# `npm run build` at the repo root first — it produces engine/dist/ (esbuild bundle with all deps
# inlined + the staged portal at engine/dist/portal/dist). main.js runs resources/engine/index.js
# via Electron-as-node. (.tmp/.map/the SEA scratch files are excluded — not needed at runtime.)
extraResources:
  - from: ../engine/dist
    to: engine
    filter:
      - "**/*"
      - "!**/*.map"
      - "!sea-prep.blob"
      - "!sea-manifest.json"

win:
  target: nsis
  icon: build/icon-axis.ico
mac:
  target: dmg
  category: public.app-category.developer-tools
  icon: build/icon-axis.png
linux:
  target: AppImage
  category: Development
  icon: build/icon-axis.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# App/tray icons are the Axis Mundi mark — see scripts/gen-axis-icons.mjs and the masters at
# build/icon-axis*.svg. electron-builder derives the platform .icns/AppImage icon from icon-axis.png;
# win.icon uses the hand-tuned icon-axis.ico (small sizes beat auto-derivation from the PNG).
